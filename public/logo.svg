<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="50%" style="stop-color:#a3e635"/>
      <stop offset="100%" style="stop-color:#facc15"/>
    </linearGradient>
    <linearGradient id="g1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a3e635;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="gl1">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="36" fill="#0a120a" stroke="url(#g1)" stroke-width="2.5"/>
  <rect x="8" y="8" width="184" height="184" rx="36" fill="url(#g1bg)"/>

  <!-- Decorative lines top-left -->
  <line x1="30" y1="50" x2="50" y2="50" stroke="#4ade80" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="30" y1="56" x2="42" y2="56" stroke="#a3e635" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Decorative lines bottom-right -->
  <line x1="150" y1="150" x2="170" y2="150" stroke="#4ade80" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="158" y1="144" x2="170" y2="144" stroke="#a3e635" stroke-width="1" opacity="0.2" stroke-linecap="round"/>

  <!-- Main text CS -->
  <text x="100" y="118" text-anchor="middle" font-family="'Segoe UI','Arial',sans-serif" font-weight="900" font-size="72" fill="url(#g1)" letter-spacing="4" filter="url(#gl1)">CS</text>

  <!-- Subtitle -->
  <text x="100" y="140" text-anchor="middle" font-family="'Courier New',monospace" font-weight="500" font-size="11" fill="#4ade80" letter-spacing="5" opacity="0.5">HEADSHOT</text>
</svg>
